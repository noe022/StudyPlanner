<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Planner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
  </style>
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header">
      <div id="logo"><p id="logo-name">Study Planner</p></div>
      <div id="input">
        <input type="text" placeholder="Add a task">
      </div>
    </div>
    <div id="layout">
      <div id="categories">
        <p id="text-subjects">Add a subject</p>
        <div id="subjects-list">
          <button id="add-task">
          <svg xmlns="http://www.w3.org/2000/svg" height="28px" viewBox="0 -960 960 960" width="28px" fill="rgb(177, 177, 177)"><path d="M446.67-446.67H200v-66.66h246.67V-760h66.66v246.67H760v66.66H513.33V-200h-66.66v-246.67Z"/></svg>
          </button>
        </div>
        <div id="subject-input">
          <input type="text" id="name-subject" placeholder="Subject name">
        </div>
      </div>
      <div id="main-content">
        <div id="progress-bar"></div>
        <div id="subject-manager"></div>
        <div id="tasks-div"></div>
      </div>
    </div>
  <script src="script.js"></script>
</body>
</html>
