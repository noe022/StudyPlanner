<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Planner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
  </style>
  <style>

  </style>
  <link rel="stylesheet" href="style.css">

<body>
  <div id="logo">
    <p>Study Planner</p>
  </div>
  <div id="main-content">
    <div id="input">
      <input type="text" placeholder="Add a task">
    </div>
    <div id="progress-bar"></div>
    <div id="subject-manager"></div>
    <div id="tasks-div"></div>
  </div>
  <script src="script copy.js"></script>
</body>
</html>

<!-- 
  Subject manager se abre cuando escribes una tarea, 
  es un botón add para añadir los tipos,
  los tipos luego se pueden asignar a las tareas
-->

<!--
  Los nuevos tipos se añaden al lado de subject-manager, horizontalmente
